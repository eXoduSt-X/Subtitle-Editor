name: Build Subtitle Editor APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Herramientas del SDK Oficial
      run: |
        # Localizamos el android.jar oficial preinstalado
        ANDROID_JAR=$(find $ANDROID_HOME/platforms/ -name "android.jar" | sort -V | tail -n 1)
        echo "Usando Android.jar en: $ANDROID_JAR"
        
        # Agregamos los build-tools oficiales (como aapt2, d8/dx) al PATH para que build.sh los encuentre
        BUILD_TOOLS_DIR=$(find $ANDROID_HOME/build-tools/ -maxdepth 1 -mindepth 1 | sort -V | tail -n 1)
        echo "Usando Build Tools en: $BUILD_TOOLS_DIR"
        echo "$BUILD_TOOLS_DIR" >> $GITHUB_PATH
        
        # Ajustamos tu script para que apunte al jar correcto
        sed -i "s|ANDROID_JAR=.*|ANDROID_JAR=\"$ANDROID_JAR\"|g" build.sh

    - name: Dar permisos de ejecución y Compilar APK
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Subir APK generado como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: SubtitleEditor-APK
        path: build/SubtitleEditor-signed.apk
